name: Generate ASCII artwork

on:
  push:

jobs:
  ascii_job1:
    runs-on: ubuntu-latest

    steps:
      - name: Install cowsay
        run: sudo apt-get update && sudo apt-get install cowsay -y

      - name: Execute cowsay
        run: cowsay -f dragon "Run for cover, I'm a dragon" > dragon.txt

      - name: Upload file
        uses: actions/upload-artifact@v7
        with:
          name: dragon-text-file
          path: dragon.txt

  test_job2:
    needs: ascii_job1
    runs-on: ubuntu-latest

    steps:
      - name: Download file
        uses: actions/download-artifact@v8
        with:
          name: dragon-text-file

      - name: Test file
        run: grep -i "dragon" dragon.txt

  deploy_job3:
    needs: test_job2
    runs-on: ubuntu-latest

    steps:
      - name: Download file
        uses: actions/download-artifact@v8
        with:
          name: dragon-text-file

      - name: Deploy by reading it only
        run: |
          cat dragon.txt
          ls -lrta